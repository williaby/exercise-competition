---
# Security Analysis Workflow
# Runs security scans including Bandit, Safety, and dependency checks.
#
# Features:
#   - Bandit static analysis for Python
#   - Safety dependency vulnerability scanning
#   - Weekly scheduled scans
name: Security Analysis

"on":
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    # Run security scans weekly on Monday at 9 AM UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:

# Cancel in-progress runs for same PR/branch
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write
  pull-requests: write

# Standalone security workflow
jobs:
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@91182cccc01eb5e619899d80e4e971d6181294a7 # v2.10.1
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run Bandit security scan
        id: bandit
        run: |
          uv run bandit -r src/ -c pyproject.toml -f json -o bandit-report.json --severity-level medium --confidence-level medium
          # Also generate human-readable output for PR review
          uv run bandit -r src/ -c pyproject.toml --severity-level medium --confidence-level medium

      # pip-audit must fail the job when vulnerabilities are found so the
      # Security Gate can block merges. Documented exceptions go through
      # --ignore-vuln referenced in docs/security/vulnerability-risk-register.md.
      - name: Run dependency vulnerability scan (pip-audit)
        id: pip-audit
        run: |
          uv run pip-audit --ignore-vuln CVE-2026-4539 --format json --output pip-audit-report.json
          uv run pip-audit --ignore-vuln CVE-2026-4539

      - name: Upload security reports
        if: always()
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b # v4.5.0
        with:
          name: security-reports
          path: |
            bandit-report.json
            pip-audit-report.json
          retention-days: 30
