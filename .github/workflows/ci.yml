# CI/CD Pipeline
# Runs tests, linting, type checking, and security scans.
#
# Features:
#   - Standard quality checks (tests, linting, type checking)
#   - Security scanning (Bandit, Safety)
#   - Codecov coverage and test analytics integration
#
# Execution order per §15.2: type check → SAST → unit tests → integration tests → coverage
name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main, master, develop]
  workflow_dispatch:

# Cancel in-progress runs for same PR/branch
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  # §15.2 — Static checks run first; tests depend on them passing
  static-checks:
    name: Static Checks (Python 3.12)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run type checker
        run: uv run basedpyright src/

      - name: Run linter
        run: uv run ruff check src/ tests/

      - name: Run security scan (Bandit)
        run: uv run bandit -r src/ -c pyproject.toml --severity-level medium --confidence-level medium

      - name: Run dependency vulnerability scan (pip-audit)
        run: uv run pip-audit --ignore-vuln CVE-2026-4539  # Documented in docs/security/vulnerability-risk-register.md

  test:
    name: Test (Python 3.12)
    needs: static-checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Create reports directory
        run: mkdir -p reports

      # §16.2 — Separate runs per test type with dedicated flags
      - name: Run unit tests
        run: |
          uv run pytest tests/unit/ -v \
            --cov=src/exercise_competition \
            --cov-branch \
            --cov-report=xml:reports/coverage-unit.xml \
            --cov-report=term-missing \
            --cov-fail-under=80 \
            --junitxml=reports/junit-unit.xml \
            -o junit_family=legacy

      - name: Run integration tests
        if: ${{ !cancelled() }}
        run: |
          uv run pytest tests/integration/ -v \
            --cov=src/exercise_competition \
            --cov-branch \
            --cov-report=xml:reports/coverage-integration.xml \
            --cov-report=term-missing \
            --cov-fail-under=0 \
            --junitxml=reports/junit-integration.xml \
            -o junit_family=legacy
          status=$?
          if [ "$status" -eq 5 ]; then
            echo "No integration tests collected (pytest exit code 5); continuing."
            exit 0
          fi
          exit "$status"

      # §16.2 — Upload coverage per flag (one report per flag)
      - name: Upload unit coverage to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@5c47607acb93fed5485fdbf7232e8a31425f672a # v4.6.0
        with:
          file: reports/coverage-unit.xml
          flags: unit
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload integration coverage to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@5c47607acb93fed5485fdbf7232e8a31425f672a # v4.6.0
        with:
          file: reports/coverage-integration.xml
          flags: integration
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      # §16.4 — Test Analytics: upload JUnit XML for flaky test detection
      - name: Upload unit test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/test-results-action@6ba3fdeec616fb91fd6a389b788a2366835a0fa2 # v1.2.1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: reports/junit-unit.xml
          flags: unit

      - name: Upload integration test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/test-results-action@6ba3fdeec616fb91fd6a389b788a2366835a0fa2 # v1.2.1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: reports/junit-integration.xml
          flags: integration

  frontend:
    name: Frontend (Node 22)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Test
        run: npm run test:run -- --coverage

      - name: Build
        run: npm run build

      - name: Upload frontend coverage
        uses: codecov/codecov-action@5c47607acb93fed5485fdbf7232e8a31425f672a # v4.6.0
        with:
          file: ./frontend/coverage/lcov.info
          flags: frontend
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
