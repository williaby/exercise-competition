# Publish to PyPI - Calls Org-Level Reusable Workflow
# This is a lightweight caller workflow that invokes the organization's
# shared PyPI publishing workflow with OIDC trusted publishing.
name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      test-pypi:
        description: 'Publish to Test PyPI instead of PyPI'
        type: boolean
        required: false
        default: false

jobs:
  publish:
    name: Publish Package
    # Pinned to ByronWilliamsCPA/.github main branch SHA as of 2026-05-15.
    uses: ByronWilliamsCPA/.github/.github/workflows/python-publish-pypi.yml@3d29e7c3677925d085bcbe7ed5791db14c6777de
    with:
      python-version: '3.12'
      package-name: 'exercise-competition'
      test-pypi: ${{ github.event.inputs.test-pypi || false }}

permissions:
  contents: read
  id-token: write  # Required for OIDC trusted publishing
