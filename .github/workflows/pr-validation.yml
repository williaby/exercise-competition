# PR Validation for Exercise Competition
# Comprehensive pull request validation with supplementary checks.
#
# Calls supplementary checks for dead code detection and changelog enforcement.
# Core code quality checks (linting, type checking, tests) are handled by ci.yml.
#
# Note: The org-level python-pr-validation.yml reusable workflow was removed.
# Its quality check functionality is covered by ci.yml (python-ci.yml reusable).
name: PR Validation

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main
      - master
      - develop

# Cancel in-progress runs for same PR
concurrency:
  group: pr-validation-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions: {}

jobs:
  # Dead Code Detection with Vulture
  dead-code:
    name: Dead Code Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@91182cccc01eb5e619899d80e4e971d6181294a7 # v2.10.1
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.12"

      - name: Install UV
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          cache-local-path: ".uv-cache"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run vulture
        run: |
          echo "## Dead Code Report" >> $GITHUB_STEP_SUMMARY
          uv run vulture src/ --min-confidence 90 | tee vulture-report.txt || true
          if [ -s vulture-report.txt ]; then
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat vulture-report.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "::warning::Potential dead code detected. Review vulture report."
          else
            echo "No dead code detected with 90% confidence." >> $GITHUB_STEP_SUMMARY
          fi

  # Changelog Enforcement
  changelog:
    name: Changelog Check
    runs-on: ubuntu-latest
    # Skip via event payload to avoid GitHub API label-timing races on the
    # opened event (e.g. Renovate PRs). Avoids out-of-step false positives
    # when main advances after the PR was opened.
    if: |
      !contains(github.event.pull_request.labels.*.name, 'skip-changelog') &&
      !contains(github.event.pull_request.labels.*.name, 'dependencies') &&
      !contains(github.event.pull_request.labels.*.name, 'documentation') &&
      !contains(github.event.pull_request.labels.*.name, 'automated')
    permissions:
      contents: read
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@91182cccc01eb5e619899d80e4e971d6181294a7 # v2.10.1
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Check for CHANGELOG update
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          git fetch origin "$BASE_REF" --no-tags
          MERGE_BASE=$(git merge-base HEAD "origin/$BASE_REF")
          if git diff --name-only "$MERGE_BASE" HEAD | grep -q "^CHANGELOG.md$"; then
            echo "CHANGELOG.md was updated - check passed."
          else
            echo "::error::CHANGELOG.md was not updated. Please add a changelog entry, or add the 'skip-changelog' label if no entry is needed."
            exit 1
          fi


  # Validation Summary
  validation-summary:
    name: Validation Summary
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: [dead-code, changelog]
    if: always()
    steps:
      - name: Check validation results
        run: |
          echo "## PR Validation Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.dead-code.result }}" == "success" ]; then
            echo "Dead Code Check: Passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "Dead Code Check: ${{ needs.dead-code.result }}" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.changelog.result }}" == "success" ]; then
            echo "Changelog: Updated" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ needs.changelog.result }}" == "skipped" ]; then
            echo "Changelog: Skipped" >> $GITHUB_STEP_SUMMARY
          else
            echo "Changelog: ${{ needs.changelog.result }}" >> $GITHUB_STEP_SUMMARY
          fi

          echo ""
          echo "PR validation checks complete." >> $GITHUB_STEP_SUMMARY
