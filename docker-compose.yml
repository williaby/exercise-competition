# Docker Compose for Exercise Competition
# Single-service SQLite monolith with production hardening

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: exercise_competition:${VERSION:-latest}
    container_name: exercise_competition-app
    env_file: .env
    ports:
      - "${APP_PORT:-8000}:8000"
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      EXERCISE_COMPETITION_JSON_LOGS: "true"
      EXERCISE_COMPETITION_DATABASE_URL: "sqlite:////app/data/competition.db"
    volumes:
      - app-data:/app/data
    read_only: true
    tmpfs:
      - /tmp:size=32M,noexec,nosuid
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    mem_limit: 256m
    cpus: "0.5"
    pids_limit: 50
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/live"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    restart: unless-stopped

volumes:
  app-data:
    driver: local
