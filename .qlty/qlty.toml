# Qlty Configuration for Exercise Competition
# Unified code quality analysis for Python backend + TypeScript frontend.
#
# For configuration reference: https://qlty.sh/d/qlty-toml
config_version = "0"

# File patterns to completely exclude from all analysis
exclude_patterns = [
    "*_min.*",
    "*-min.*",
    "*.min.*",
    "*.log",
    "**/__pycache__/**",
    "**/*.pyc",
    "**/*.pyo",
    "**/.pytest_cache/**",
    "**/.mypy_cache/**",
    "**/.ruff_cache/**",
    "**/node_modules/**",
    "**/.venv/**",
    "**/venv/**",
    "**/build/**",
    "**/dist/**",
    "**/*.egg-info/**",
    "**/data/**",
    "**/.git/**",
    "**/testdata/**",
    "**/vendor/**",
    "**/tests/fixtures/**",
    "**/htmlcov/**",
    "**/coverage/**",
    "**/.tmp-*",
    "**/tmp_cleanup/**",
]

# Patterns to identify test files for enhanced analysis
test_patterns = [
    "**/tests/**",
    "**/test_*.py",
    "**/*_test.py",
    "**/*.test.*",
    "**/*.spec.*",
]

# Default source for plugin definitions
[[source]]
name = "default"
default = true

# ============================================================================
# Code Quality Metrics - Maintainability and Complexity
# ============================================================================

[smells]
# Mode: comment (add PR comments) vs block (fail CI)
mode = "comment"

# Boolean logic complexity
[smells.boolean_logic]
enabled = true
threshold = 6  # Max boolean operators in a single expression

# Nested control flow (if/for/while nesting)
[smells.nested_control_flow]
enabled = true
threshold = 4  # Max nesting depth

# Function parameters
[smells.function_parameters]
enabled = true
threshold = 7  # Max parameters per function

# Return statements
[smells.return_statements]
enabled = true
threshold = 5  # Max return statements per function

# File complexity
[smells.file_complexity]
enabled = true
threshold = 750  # Max lines of code per file (Python-friendly)

# Function complexity (cyclomatic complexity)
[smells.function_complexity]
enabled = true
threshold = 12  # Google/Pylint standard for Python

# ============================================================================
# Plugins
# ============================================================================

# Python linting with Ruff (reads config from pyproject.toml [tool.ruff])
[[plugin]]
name = "ruff"
drivers = ["lint"]

# Python security with Bandit (comment mode - don't block CI)
# Note: B101 (assert in tests) shows as noise here since qlty doesn't support
# per-plugin ignore_patterns. Fine-grained exclusions are in pyproject.toml [tool.bandit].
[[plugin]]
name = "bandit"
mode = "comment"

# TypeScript/JavaScript linting with ESLint
# Disabled: qlty-bundled ESLint conflicts with project's ESLint 9 flat config.
# Frontend linting runs via `npm run lint` in CI instead.
# [[plugin]]
# name = "eslint"

# Shell script linting
[[plugin]]
name = "shellcheck"

# YAML linting (comment mode - don't block CI for formatting)
[[plugin]]
name = "yamllint"
mode = "comment"

# Markdown linting (comment mode - don't block CI)
[[plugin]]
name = "markdownlint"
mode = "comment"

# GitHub Actions linting
[[plugin]]
name = "actionlint"

# Docker linting
[[plugin]]
name = "hadolint"

# Secrets detection
[[plugin]]
name = "gitleaks"

# Vulnerability scanning
[[plugin]]
name = "osv-scanner"

# ============================================================================
# Note on Additional Security Scanning
# ============================================================================
# Some security tools also run via pre-commit hooks for defense-in-depth:
# - detect-secrets / gitleaks: Secrets detection (both pre-commit and qlty)
# - bandit: Python security linter (both pre-commit and qlty)
# - pip-audit: Dependency vulnerability scanning (pre-commit only)
#
# See .pre-commit-config.yaml for the full pre-commit configuration.
